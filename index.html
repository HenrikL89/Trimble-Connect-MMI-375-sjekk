<!DOCTYPE html>
<html>
<head>
    <title>MMI Auditor</title>
    <script src="https://app.connect.trimble.com/tc/api/2.0/api.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background: #f9f9f9; }
        h3 { color: #333; border-bottom: 2px solid #0078d4; padding-bottom: 5px; }
        button { 
            background: #0078d4; color: white; border: none; padding: 10px 15px; 
            border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold;
        }
        button:hover { background: #005a9e; }
        #results { margin-top: 15px; }
        .model-card { 
            background: white; border: 1px solid #ddd; padding: 10px; 
            margin-bottom: 8px; border-radius: 4px; font-size: 13px;
        }
        /* The Red Class for Outdated Models */
        .outdated { 
            border-left: 5px solid #d9534f; 
            color: #a94442;
            background: #fdf2f2;
        }
        .status-tag { font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .loading { font-style: italic; color: #666; }
    </style>
</head>
<body>
    <h3>MMI 375 Status</h3>
    <button id="checkBtn">Check All Models</button>
    
    <div id="results">
        <p>Click the button to scan loaded models.</p>
    </div>

    <script>
        const tcSpace = TrimbleConnect.init();

        document.getElementById('checkBtn').addEventListener('click', async () => {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "<p class='loading'>Scanning properties... this may take a moment for large models.</p>";
            
            try {
                const sixWeeksAgo = new Date();
                sixWeeksAgo.setDate(sixWeeksAgo.getDate() - 42);

                const loadedModels = await tcSpace.viewer.getModels();
                
                if (loadedModels.length === 0) {
                    resultsDiv.innerHTML = "No models loaded in the viewer.";
                    return;
                }

                resultsDiv.innerHTML = ""; // Clear loading text

                for (const model of loadedModels) {
                    const objects = await tcSpace.viewer.getObjectProperties(model.id);
                    
                    let hasMMI375 = false;
                    let isOutdated = false;
                    let mmiCount = 0;
                    let latestFoundDate = null;

                    // Loop through every object in the model
                    objects.forEach(obj => {
                        let objHas375 = false;
                        let objDate = null;

                        // Loop through Property Sets (e.g., Pset_WallCommon, etc)
                        if (obj.propertySets) {
                            obj.propertySets.forEach(pset => {
                                pset.properties.forEach(prop => {
                                    
                                    // Check MMI property
                                    if (prop.name === "MMI" && prop.value == "375") {
                                        hasMMI375 = true;
                                        objHas375 = true;
                                        mmiCount++;
                                    }

                                    // Check Revisjonsdato property
                                    if (prop.name === "Revisjonsdato" && prop.value) {
                                        objDate = new Date(prop.value);
                                    }
                                });
                            });
                        }

                        // Check if this specific object is the problem
                        if (objHas375 && objDate) {
                            if (objDate < sixWeeksAgo) {
                                isOutdated = true;
                            }
                        }
                    });

                    // Only list models that actually contain MMI 375
                    if (hasMMI375) {
                        renderModelResult(model.name, isOutdated, mmiCount);
                    }
                }

                if (resultsDiv.innerHTML === "") {
                    resultsDiv.innerHTML = "Found models, but none contained the property 'MMI' with value '375'.";
                }

            } catch (error) {
                resultsDiv.innerHTML = "Error: " + error.message;
                console.error("MMI Extension Error:", error);
            }
        });

        function renderModelResult(name, isOutdated, count) {
            const resultsDiv = document.getElementById('results');
            const card = document.createElement('div');
            card.className = 'model-card' + (isOutdated ? ' outdated' : '');
            
            card.innerHTML = `
                <div class="status-tag">${isOutdated ? '⚠️ OUTDATED (> 6 Weeks)' : '✅ UP TO DATE'}</div>
                <strong>${name}</strong><br>
                <span>Found ${count} objects with MMI 375</span>
            `;
            resultsDiv.appendChild(card);
        }
    </script>
</body>
</html>
